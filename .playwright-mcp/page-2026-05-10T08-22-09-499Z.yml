          - generic [ref=e61]: 01 / WHO
          - heading "I make AI feel like a real product." [level=3] [ref=e62]
          - paragraph [ref=e63]: Most AI demos crumble under a real conversation. I obsess over the seams — latency, interruption handling, tool-use, fallback. The work that survives contact with users is the work I want to do.
        - article [ref=e64]:
          - generic [ref=e66]: 02 / WHAT
          - heading "Voice-first, agent-shaped systems." [level=3] [ref=e67]
          - paragraph [ref=e68]: Phones. Smart glasses. Browser sidebars. Pinned terminals. Wherever the interface is least visual, I'm trying to make it more useful — for banking, education, public safety, food rescue, sports tape.
        - article [ref=e69]:
          - generic [ref=e71]: 03 / HOW
          - heading "Ship a startup-grade product every weekend." [level=3] [ref=e72]
          - paragraph [ref=e73]: "Twelve hackathon wins is a lot of weekends. The discipline of 36 hours sharpens the instinct: pick the smallest demo that proves the hypothesis, build the spine first, decorate last."
        - article [ref=e74]:
          - generic [ref=e76]: 04 / WHY
          - heading "The next billion users will talk to software." [level=3] [ref=e77]
          - paragraph [ref=e78]: Most people on Earth still type slower than they speak — and a lot of them never learned to type at all. Every product I touch tries to bend the floor of access a little closer to the ground.
